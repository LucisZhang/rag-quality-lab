name: ci

# Model-free CI: lint, unit tests (LLM calls mocked), data-manifest
# verification, and the deterministic half of the A3 verifier. No model
# inference, no vector stores, no network beyond pip installs.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies (lightweight; no torch/chromadb/ollama)
        run: python -m pip install -r requirements-ci.txt

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Unit tests (model-free; LLM calls mocked)
        run: python -m pytest

      - name: Verify data files against data/MANIFEST.json
        run: python scripts/verify_data.py

      - name: Verify saved artifacts (verify_a3.py deterministic parts)
        run: python scripts/ci/run_verify_a3_deterministic.py
